# ONLINE-constrained d=7: causal time mask -- each token attends only to
# syndrome at its own round or earlier. Same arch/budget as d7_local so the
# offline-vs-online LER gap and cleared/defect stats are directly comparable.
run_dir: runs/d7_online
distance: 7
rounds: 7
p: 0.03
steps: 120000
batch_size: 64
lr: 2.0e-3
min_lr: 8.0e-5
warmup: 800
weight_decay: 1.0e-4
grad_clip: 1.0
eval_batch: 512
eval_every: 3000
eval_shots: 80000
infer_steps: 24
log_every: 200
ckpt_every: 3000
max_minutes: 1320
seed: 0
model:
  d_model: 64           # scaling analysis: 64 sufficient
  n_heads: 4
  n_layers: 6
  d_ff: 256
  use_conv_stem: true
  conv_layers: 1
  conv_channels: 32
  xi_space_init: 2.0    # spatial decay length (lattice units), trainable
  xi_time_init: 2.0     # temporal decay length (rounds), trainable
  xi_min: 1.0           # floor: token always reaches its lattice neighbors
  causal_time: true     # online information constraint
  # window_radius: null -> pure soft local attention (SDPA additive bias)
