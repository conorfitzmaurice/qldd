# clean locality test: d=7, conv stem off so sigma carries all the range
run_dir: runs/d7_local
distance: 7
rounds: 7
p: 0.03
steps: 120000
batch_size: 64
lr: 2.0e-3
min_lr: 8.0e-5
warmup: 800
weight_decay: 1.0e-4
grad_clip: 1.0
eval_batch: 512
eval_every: 3000
eval_shots: 80000
infer_steps: 24
log_every: 200
ckpt_every: 3000
max_minutes: 1320
seed: 0
model:
  d_model: 64           # scaling analysis: 64 sufficient
  n_heads: 4
  n_layers: 6
  d_ff: 256
  use_conv_stem: true   # 1 conv layer (RF~3): guaranteed local context so xi
                        # can't collapse to "attend to nothing". xi then measures
                        # the RESIDUAL attention range on top of local mixing.
  conv_layers: 1
  conv_channels: 32
  xi_space_init: 2.0    # spatial decay length (lattice units), trainable
  xi_time_init: 2.0     # temporal decay length (rounds), trainable
  xi_min: 1.0           # floor: token always reaches its lattice neighbors
  # window_radius: null -> pure soft local attention (SDPA additive bias)
